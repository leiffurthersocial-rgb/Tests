<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMV Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    body { background-color: #f4f4f7; color: #1a1a1a; padding: 40px 10px; }
    .container { max-width: 720px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
    
    header { text-align: center; margin-bottom: 30px; }
    h1 { font-size: 28px; letter-spacing: -1px; margin-bottom: 10px; }
    .subtitle { color: #666; font-size: 14px; }

    h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin: 40px 0 20px; color: #007aff; border-bottom: 1px solid #eee; padding-bottom: 10px; }

    .slider-group { margin-bottom: 25px; padding: 20px; background: #f9f9fb; border-radius: 12px; border: 1px solid #f0f0f0; transition: 0.3s; }
    .slider-group.excluded { opacity: 0.35; pointer-events: none; filter: grayscale(1); }
    
    .label-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; gap: 12px; }
    .label-title { font-size: 16px; font-weight: 700; line-height: 1.35; }
    
    .exclude-wrapper { display: flex; align-items: center; gap: 8px; pointer-events: auto; flex-shrink: 0; }
    .switch { position: relative; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-toggle { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider-toggle:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider-toggle { background-color: #007aff; }
    input:checked + .slider-toggle:before { transform: translateX(14px); }

    .slider-container { display: flex; align-items: center; gap: 15px; }
    input[type="range"] { -webkit-appearance: none; flex-grow: 1; height: 5px; background: #ddd; border-radius: 5px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #007aff; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    
    .value-display { font-size: 16px; font-weight: 800; color: #007aff; min-width: 72px; text-align: right; }
    .dynamic-desc { margin-top: 12px; font-size: 13px; color: #555; line-height: 1.5; font-style: italic; }

    button { background: #000; color: #fff; border: none; width: 100%; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    
    #results { display: none; margin-top: 40px; padding: 30px; background: #007aff; color: white; border-radius: 16px; text-align: center; }
    .score-number { font-size: 64px; font-weight: 900; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; }
    .stat-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; }
    .stat-val { font-size: 20px; font-weight: 700; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>SMV Calculator</h1>
    <p class="subtitle">Weighted Data Analysis</p>
  </header>

  <div id="calculator-form"></div>

  <button onclick="calculateScore()">Analyze Profile</button>

  <div id="results">
    <div style="font-size: 14px; text-transform: uppercase; opacity: 0.9;">Global Market Percentile</div>
    <div class="score-number" id="final-score">0</div>
    <div id="tier-name" style="font-weight: 700; font-size: 20px; margin: 10px 0;"></div>
    <div class="stats-grid">
      <div>
        <div class="stat-label">Consistency Score</div>
        <div class="stat-val" id="consistency-score">0%</div>
      </div>
      <div>
        <div class="stat-label">Active Metrics</div>
        <div class="stat-val" id="active-count">0</div>
      </div>
    </div>
  </div>
</div>

<script>
  const categories = [
    { section: "Primary Physicals (High Weight)" },
    { id: "face", title: "Facial Aesthetics 🧏‍♂️ ", weight: 30, min: 1, max: 10, step: 0.1, default: 5,
      getDesc: v => {
        if (v >= 9) return "Exceptional facial harmony. Very strong symmetry, sharp features, and strong immediate visual appeal.";
        if (v >= 8) return "Clearly attractive. Above-average symmetry and proportions, strong first-impression value.";
        if (v >= 6.5) return "Noticeably above average. Pleasant features that read well in person and in photos.";
        if (v >= 5) return "Middle-of-the-road. A normal face with some good features and some average ones.";
        if (v >= 3.5) return "Below average. Noticeable imperfections or weak feature balance, but not severely unattractive.";
        return "Strongly below average. Major asymmetry, poor proportions, or harsh features that draw negative attention.";
      },
      scoreMap: v => v / 10 },

    { id: "height", title: "Height 🦒 (cm)", weight: 25, min: 155, max: 200, step: 1, default: 177,
      getDesc: v => {
        if (v >= 192) return "Exceptionally tall. Very uncommon height and a major visual advantage in most settings.";
        if (v >= 186) return "Very tall. Strong height advantage, clearly above the typical range.";
        if (v >= 180) return "Tall. Solid advantage and visibly above average in most environments.";
        if (v >= 174) return "Average to slightly above average. Normal male height range with no major height drawback.";
        if (v >= 168) return "Below average. Somewhat short compared with the typical adult male range.";
        return "Very short. Height is likely to be a noticeable disadvantage in first impressions.";
      },
      scoreMap: v => v >= 188 ? 1 : v >= 183 ? 0.9 : v >= 178 ? 0.7 : v >= 170 ? 0.4 : 0.1 },
    
    { section: "Secondary Physicals" },
    { id: "lean", title: "Body Fat % 🫃", weight: 12, min: 6, max: 35, step: 1, default: 18,
      getDesc: v => {
        if (v <= 9) return "Extremely lean. Stage-level leanness, very visible muscle separation, but difficult to sustain.";
        if (v <= 12) return "Lean and defined. Clear ab visibility and athletic conditioning.";
        if (v <= 15) return "Fit and reasonably lean. Good shape, waist still tight, face usually looks sharper.";
        if (v <= 19) return "Average but acceptable. Not visibly lean, but not soft or out of shape.";
        if (v <= 24) return "Soft / average-to-high body fat. Less definition, rounder midsection, weaker muscle visibility.";
        return "High body fat. Physique looks noticeably overweight, with limited definition.";
      },
      scoreMap: v => v <= 12 ? 1 : v <= 15 ? 0.9 : v <= 20 ? 0.6 : 0.2 },

    { id: "muscle", title: "Muscle Mass💪", weight: 10, min: 1, max: 10, step: 1, default: 5,
      getDesc: v => {
        if (v <= 1) return "Very little muscle development. Sedentary look, minimal upper-body shape, and little physical training base.";
        if (v <= 2) return "Undertrained. Little visible muscle, narrow-looking frame, and no clear gym progress yet.";
        if (v <= 3) return "Lightly trained. Some basic development, but still mostly beginner-level and unremarkable.";
        if (v <= 4) return "Early progress. Noticeable that you train somewhat, but size and shape are still limited.";
        if (v <= 5) return "Moderate development. Some muscle presence, but not yet clearly athletic or impressive.";
        if (v <= 6) return "Trained and visibly fit. Regular gym work shows, with decent size or shape in a few areas.";
        if (v <= 7) return "Clearly muscular. People would recognize you as someone who trains consistently.";
        if (v <= 8) return "Strong muscular build. Well-developed shoulders, chest, arms, and upper-body presence.";
        if (v <= 9) return "Very muscular. Advanced training result with dense size and obvious physique investment.";
        return "Exceptional muscularity. Top-tier physique, highly developed and difficult to ignore.";
      },
      scoreMap: v => v / 10 },

    { id: "frame", title: "Shoulder Width / Frame 🩻", weight: 8, min: 1, max: 10, step: 1, default: 5,
      getDesc: v => {
        if (v <= 2) return "Very narrow frame. Small shoulder structure and limited visual presence.";
        if (v <= 4) return "Below-average frame. Somewhat narrow, with less naturally imposing proportions.";
        if (v <= 6) return "Average frame. Normal proportions with neither a big advantage nor a strong drawback.";
        if (v <= 7) return "Good frame. Noticeably solid proportions and a decent base for looking broad.";
        if (v <= 8) return "Wide and athletic frame. Strong shoulder-to-waist structure and good V-taper potential.";
        return "Excellent frame. Naturally broad, imposing proportions that create strong physical presence.";
      },
      scoreMap: v => v / 10 },

    { id: "hair", title: "Hair Quality / Hairline 👱‍♂️", weight: 7, min: 1, max: 10, step: 1, default: 7,
      getDesc: v => {
        if (v <= 2) return "Very poor hair situation. Severe thinning, obvious recession, or near-bald appearance.";
        if (v <= 4) return "Weak hair quality. Noticeable thinning, recession, or patchiness that affects appearance.";
        if (v <= 6) return "Average hair. Functional and acceptable, but not especially thick, full, or strong.";
        if (v <= 8) return "Good hair. Fairly full, healthy-looking, and generally supportive of your appearance.";
        return "Excellent hair. Thick, full, healthy, and a clear positive feature.";
      },
      scoreMap: v => v / 10 },

    { id: "voice", title: "Voice Depth / Resonance 🗣️", weight: 5, min: 1, max: 10, step: 1, default: 5,
      getDesc: v => {
        if (v <= 2) return "Very high or weak voice. Thin, nasal, or lacking the kind of resonance that sounds grounded.";
        if (v <= 4) return "Slightly high / average-low resonance. Not bad, but not especially strong-sounding.";
        if (v <= 6) return "Average voice. Usable and normal, with no major positive or negative effect.";
        if (v <= 8) return "Good voice. Clear, stable, and noticeably deeper or more resonant than average.";
        return "Excellent voice. Deep, resonant, and strong-sounding in a way that adds presence.";
      },
      scoreMap: v => v / 10 },

    { id: "skin", title: "Skin Clarity🧴", weight: 5, min: 1, max: 10, step: 1, default: 7,
      getDesc: v => {
        if (v <= 2) return "Severely affected skin. Heavy acne, strong scarring, redness, or visible irritation.";
        if (v <= 4) return "Problematic skin. Noticeable acne, scarring, or uneven texture that stands out.";
        if (v <= 6) return "Average skin. Some imperfections, but generally acceptable and not highly distracting.";
        if (v <= 8) return "Good skin. Clear, even-looking, and visually healthy.";
        return "Excellent skin. Very clear, smooth, and polished appearance.";
      },
      scoreMap: v => v / 10 },

    { section: "Social & Hobby Attractiveness" },
    { id: "income", title: "Annual Income 💵", weight: 15, min: 1, max: 10, step: 1, default: 5,
      getDesc: v => {
        if (v <= 2) return "Very low income. Financially limited with little visible spending power.";
        if (v <= 4) return "Modest income. Basic stability, but not much room for a visibly elevated lifestyle.";
        if (v <= 6) return "Solid middle income. Comfortable enough to live normally without obvious financial pressure.";
        if (v <= 8) return "Strong income. Clearly above average and capable of supporting a more attractive lifestyle.";
        return "Very high income. Top-tier earning power with strong flexibility, comfort, and status signaling.";
      },
      scoreMap: v => v / 10 },

    { id: "social", title: "Social Skills / Charm 💬", weight: 15, min: 1, max: 10, step: 1, default: 5,
      getDesc: v => {
        if (v <= 2) return "Very awkward. Struggles to hold conversations, read rooms, or create comfort.";
        if (v <= 4) return "Below average socially. Can communicate, but lacks polish, ease, or strong presence.";
        if (v <= 6) return "Average social ability. Functional conversational skills without much standout charisma.";
        if (v <= 8) return "Good social instincts. Comfortable, smooth, and generally easy to talk to.";
        return "Excellent charm. Naturally engaging, warm, and highly effective in social settings.";
      },
      scoreMap: v => v / 10 },

    { id: "status", title: "Social Status / Reputation 🕴🏻", weight: 12, min: 1, max: 10, step: 1, default: 2,
      getDesc: v => {
        if (v <= 2) return "Very low status. Little recognition, influence, or social leverage.";
        if (v <= 4) return "Limited status. Known in a small circle, but not especially prominent.";
        if (v <= 6) return "Moderate status. Some social credibility, local recognition, or useful network value.";
        if (v <= 8) return "Strong status. Well-regarded, influential in your circle, or clearly respected.";
        return "High status. Broad recognition, leadership, or a strong reputation that stands out.";
      },
      scoreMap: v => v / 10 },

    { id: "hobby", title: "Hobby Attractiveness 🥊", weight: 10, min: 1, max: 10, step: 1, default: 4,
      getDesc: v => {
        if (v <= 1) return "No real hobbies. Mostly passive consumption, scrolling, gaming-only, or nothing identity-building to show.";
        if (v <= 2) return "Very weak hobby profile. Low-signal hobbies that are hard to talk about or rarely look attractive to others.";
        if (v <= 3) return "Below-average hobbies. Mainly solitary or niche activities with little social or physical appeal.";
        if (v <= 4) return "Mildly interesting hobbies. Some activity, but not especially impressive, social, or masculine-looking.";
        if (v <= 5) return "Decent hobbies. A normal mix of interests that can be talked about, but not strongly attractive.";
        if (v <= 6) return "Good hobbies. Active, skill-building, or social interests that add personality and depth.";
        if (v <= 7) return "Strong hobby profile. Hobbies are clearly interesting, active, or socially appealing.";
        if (v <= 8) return "Very attractive hobbies. Regular training, skill, competition, travel, music, or other high-signal pursuits.";
        if (v <= 9) return "Excellent hobby value. Hobbies suggest discipline, competence, or a lifestyle people find impressive.";
        return "Top-tier hobby profile. Strongly attractive, distinctive, and easy to talk about in a positive way.";
      },
      scoreMap: v => v / 10 }
  ];

  const form = document.getElementById("calculator-form");
  const state = {};

  categories.forEach(cat => {
    if (cat.section) {
      const h2 = document.createElement("h2");
      h2.textContent = cat.section;
      form.appendChild(h2);
      return;
    }
    state[cat.id] = { val: cat.default, excluded: false, config: cat };
    const group = document.createElement("div");
    group.className = "slider-group";
    group.id = `g-${cat.id}`;
    group.innerHTML = `
      <div class="label-row">
        <span class="label-title">${cat.title}</span>
        <div class="exclude-wrapper">
          <span style="font-size:11px; color:#999">Include</span>
          <label class="switch"><input type="checkbox" checked onchange="toggleEx('${cat.id}')"><span class="slider-toggle"></span></label>
        </div>
      </div>
      <div class="slider-container">
        <input type="range" min="${cat.min}" max="${cat.max}" step="${cat.step}" value="${cat.default}" oninput="updateVal('${cat.id}', this.value)">
        <span class="value-display" id="v-${cat.id}">${cat.default}${cat.id==='height'?'cm':''}</span>
      </div>
      <div class="dynamic-desc" id="d-${cat.id}">${cat.getDesc(cat.default)}</div>
    `;
    form.appendChild(group);
  });

  window.updateVal = (id, val) => {
    state[id].val = parseFloat(val);
    document.getElementById(`v-${id}`).textContent = val + (id === 'height' ? 'cm' : '');
    document.getElementById(`d-${id}`).textContent = state[id].config.getDesc(state[id].val);
  };

  window.toggleEx = (id) => {
    state[id].excluded = !state[id].excluded;
    document.getElementById(`g-${id}`).classList.toggle("excluded");
  };

  function calculateScore() {
    let earned = 0, possible = 0, scores = [];

    Object.keys(state).forEach(k => {
      const s = state[k];
      if (!s.excluded) {
        const n = s.config.scoreMap(s.val);
        earned += (n * s.config.weight);
        possible += s.config.weight;
        scores.push(n);
      }
    });

    let final = 0;
    let mean = 0;
    let stdDev = 0;
    let consistency = 0;

    if (possible > 0 && scores.length > 0) {
      final = Math.round((earned / possible) * 100);
      mean = scores.reduce((a, b) => a + b, 0) / scores.length;
      stdDev = Math.sqrt(scores.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / scores.length);
      consistency = Math.max(0, Math.round(100 - (stdDev * 200)));
    }

    document.getElementById("final-score").textContent = final;
    document.getElementById("consistency-score").textContent = consistency + "%";
    document.getElementById("active-count").textContent = scores.length;
    document.getElementById("results").style.display = "block";
    
    let t = "Average";
    if (scores.length === 0) t = "No Active Metrics";
    else if (final > 90) t = "True Jovan🗿";
    else if (final > 80) t = "Elite / Model";
    else if (final > 65) t = "High Value";
    else if (final < 40) t = "True Robin🤓";

    document.getElementById("tier-name").textContent = t;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
</script>
</body>
</html>
